<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iniciar Sesion — MI AGENTE</title>
<style>
@font-face{font-family:'Sequel';src:local('Sequel Sans');font-weight:300;font-style:normal}
@font-face{font-family:'Sequel';src:local('Sequel Sans');font-weight:400;font-style:normal}
@font-face{font-family:'Sequel';src:local('Sequel Sans');font-weight:500;font-style:normal}
@font-face{font-family:'Sequel';src:local('Sequel Sans');font-weight:700;font-style:normal}

:root {
  --bg-main:#0B0F19; --bg-panel:#111827; --bg-sidebar:#0F172A;
  --blue:#4F46E5; --cyan:#06B6D4; --purple:#8B5CF6;
  --gold:#D4AF37; --gold-light:#F5D97E; --gold-dark:#B8962E;
  --input-bg:#1F2937; --input-border:#374151; --input-focus:#D4AF37;
  --text-primary:#F9FAFB; --text-secondary:#9CA3AF;
  --success:#22d3a0; --danger:#ff6b8a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Sequel',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg-main);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow-x:hidden;
}
/* Ambient light effects */
body::before{content:'';position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.08),transparent 70%);
  top:-200px;right:-100px;filter:blur(100px);pointer-events:none;z-index:0;
  animation:blobFloat1 12s ease-in-out infinite}
body::after{content:'';position:fixed;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(79,70,229,0.1),transparent 70%);
  bottom:-150px;left:-100px;filter:blur(100px);pointer-events:none;z-index:0;
  animation:blobFloat2 15s ease-in-out infinite}
@keyframes blobFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,30px) scale(1.15)}}
@keyframes blobFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-25px) scale(1.1)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0.3)}50%{box-shadow:0 0 0 8px rgba(212,175,55,0)}}

.login-container{
  position:relative;z-index:1;width:100%;max-width:440px;padding:20px;
  animation:fadeSlideUp 0.6s cubic-bezier(0.16,1,0.3,1);
}

/* Logo Card */
.logo-card{
  background:linear-gradient(145deg,#111827,#0F172A);
  border:1px solid rgba(212,175,55,0.15);border-radius:24px;
  padding:36px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 1px 0 rgba(212,175,55,0.1) inset;
}
.logo-card::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.06),transparent 70%);
  top:-120px;right:-80px;pointer-events:none}
.logo-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.3),transparent)}
.logo-icon{width:68px;height:68px;border-radius:20px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;box-shadow:0 0 40px rgba(212,175,55,0.3),0 0 80px rgba(212,175,55,0.1);
  font-size:28px;color:#0B0F19;animation:pulse-gold 3s ease-in-out infinite}
.logo-title{color:var(--text-primary);font-size:26px;font-weight:700;margin-bottom:6px;
  position:relative;z-index:1;letter-spacing:-0.02em}
.logo-sub{color:var(--text-secondary);font-size:13px;font-weight:300;position:relative;z-index:1}

/* Form Card */
.form-card{
  background:rgba(17,24,39,0.8);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);border:1px solid rgba(55,65,81,0.6);
  border-radius:24px;padding:36px;
  box-shadow:0 12px 40px rgba(0,0,0,0.3);
}
.form-title{color:var(--text-primary);font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-0.01em}
.form-sub{color:var(--text-secondary);font-size:13px;margin-bottom:28px;font-weight:300}

.lbl{display:block;color:var(--text-secondary);font-size:11px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.inp{width:100%;background:var(--input-bg);border:1.5px solid var(--input-border);
  border-radius:12px;padding:14px 18px;color:var(--text-primary);
  font-family:'Sequel',system-ui,monospace;font-size:14px;font-weight:400;
  outline:none;transition:all 0.25s;box-sizing:border-box}
.inp:focus{border-color:var(--input-focus);background:rgba(31,41,55,0.8);
  box-shadow:0 0 0 3px rgba(212,175,55,0.15),0 0 20px rgba(212,175,55,0.05)}
.inp::placeholder{color:rgba(156,163,175,0.5)}

.btn-gold{width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:#0B0F19;border:none;border-radius:12px;padding:16px;
  font-family:'Sequel',system-ui,sans-serif;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 30px rgba(212,175,55,0.3);transition:all 0.3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:0.02em}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(212,175,55,0.45);
  background:linear-gradient(135deg,var(--gold-light),var(--gold))}
.btn-gold:active{transform:translateY(0)}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.error-msg{background:rgba(255,107,138,0.08);border:1px solid rgba(255,107,138,0.2);
  border-radius:12px;padding:14px 18px;color:#ff6b8a;font-size:13px;font-weight:500;
  margin-bottom:16px;display:none}
.error-msg.show{display:flex;align-items:center;gap:8px}

.success-msg{background:rgba(34,211,160,0.08);border:1px solid rgba(34,211,160,0.2);
  border-radius:12px;padding:14px 18px;color:#22d3a0;font-size:13px;font-weight:500;
  margin-bottom:16px;display:none}
.success-msg.show{display:flex;align-items:center;gap:8px}

.link-row{text-align:center;margin-top:24px;color:var(--text-secondary);font-size:13px;font-weight:400}
.link-row a{color:var(--gold);font-weight:600;text-decoration:none;transition:color 0.2s}
.link-row a:hover{color:var(--gold-light);text-decoration:underline}

/* Divider */
.divider{display:flex;align-items:center;gap:16px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--input-border)}
.divider span{color:var(--text-secondary);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em}

/* RESPONSIVE MOBILE */
@media(max-width:480px){
  body{padding:12px}
  .login-container{padding:10px}
  .logo-card{padding:24px 20px;border-radius:20px;margin-bottom:16px}
  .logo-icon{width:90px!important;height:90px!important}
  .logo-icon img{width:90px!important;height:90px!important}
  .logo-title{font-size:22px}
  .logo-sub{font-size:12px}
  .form-card{padding:24px 20px;border-radius:20px}
  .form-title{font-size:19px}
  .form-sub{font-size:12px;margin-bottom:20px}
  .inp{padding:14px 16px;font-size:15px;border-radius:14px;-webkit-appearance:none}
  .btn-gold{padding:16px;font-size:15px;border-radius:14px;min-height:52px}
  .lbl{font-size:11px;margin-bottom:6px}
  .error-msg,.success-msg{font-size:12px;padding:12px 14px}
  .link-row{font-size:13px;margin-top:20px}
}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo-card">
    <div class="logo-icon" style="background:none;box-shadow:none;animation:none;width:120px;height:120px">
      <img src="/IMAGEN/logo3_nobg.png" alt="Logo" style="width:120px;height:120px;object-fit:contain"/>
    </div>
    <div class="logo-title">MI AGENTE</div>
    <div class="logo-sub">Sistema de Ventas con Inteligencia Artificial</div>
  </div>

  <div class="form-card">
    <div class="form-title">Iniciar Sesion</div>
    <div class="form-sub">Ingresa tus credenciales para acceder al sistema</div>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div style="margin-bottom:18px">
        <label class="lbl">Usuario Fase Global</label>
        <input type="text" id="username" class="inp" placeholder="Tu usuario de Fase Global" required autocomplete="username"/>
      </div>
      <div style="margin-bottom:28px">
        <label class="lbl">Contrasena</label>
        <input type="password" id="password" class="inp" placeholder="Tu contrasena" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-gold" id="btnSubmit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0B0F19" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Iniciar Sesion
      </button>
    </form>

    <div class="link-row">
      No tienes cuenta? <a href="/register">Registrate aqui</a>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';

const token = localStorage.getItem('token');
if (token) {
  fetch(API + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.json())
    .then(data => {
      if (data.id) {
        window.location.href = data.role === 'admin' ? '/admin' : '/panel';
      }
    }).catch(() => {});
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('success').classList.remove('show');
}

function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('error').classList.remove('show');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<div style="width:20px;height:20px;border:2px solid #0B0F19;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite"></div> Ingresando...';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();

    if (!res.ok) {
      if (data.status === 'pendiente') {
        showError('Tu cuenta esta pendiente de aprobacion por el administrador.');
      } else {
        showError(data.error || 'Error al iniciar sesion');
      }
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0B0F19" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Iniciar Sesion';
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    showSuccess('Bienvenido ' + data.user.nombre + '!');

    setTimeout(() => {
      window.location.href = data.user.role === 'admin' ? '/admin' : '/panel';
    }, 500);
  } catch(err) {
    showError('Error de conexion con el servidor');
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0B0F19" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Iniciar Sesion';
  }
}
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
