<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="/IMAGEN/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/IMAGEN/favicon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/IMAGEN/apple-touch-icon.png"/>
<title>WhatsApp Bots — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
:root {
  --bg-light:   #c8dff7;
  --bg-mid:     #a8c8ee;
  --navy-deep:  #0b1d3a;
  --navy-card:  #0d2554;
  --navy-mid:   #1a3a70;
  --cyan:       #3eb8f0;
  --cyan-bright:#5dd0ff;
  --cyan-glow:  rgba(62,184,240,0.35);
  --white:      #ffffff;
  --white-80:   rgba(255,255,255,0.8);
  --white-50:   rgba(255,255,255,0.5);
  --white-20:   rgba(255,255,255,0.2);
  --white-10:   rgba(255,255,255,0.1);
  --text-dark:  #0b1d3a;
  --text-mid:   #3a5a8c;
  --text-light: rgba(255,255,255,0.7);
  --success:    #22d3a0;
  --danger:     #ff6b8a;
  --warn:       #ffc857;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body,#root { height:100%; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: linear-gradient(145deg, #d6eaf8 0%, #c2d9f0 30%, #adc9e8 60%, #b8d4f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background blobs */
body::before, body::after {
  content:'';
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
body::before {
  width:500px; height:500px;
  background: radial-gradient(circle, rgba(62,184,240,0.25), transparent 70%);
  top:-100px; right:-100px;
  animation: blobFloat1 8s ease-in-out infinite;
}
body::after {
  width:400px; height:400px;
  background: radial-gradient(circle, rgba(13,37,84,0.15), transparent 70%);
  bottom:-80px; left:-80px;
  animation: blobFloat2 10s ease-in-out infinite;
}

@keyframes blobFloat1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,30px) scale(1.1)} }
@keyframes blobFloat2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-20px) scale(1.05)} }
@keyframes fadeSlideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.95)} }
@keyframes shimmer { 0%{background-position:200% center} 100%{background-position:-200% center} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* Glass card base */
.glass {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(11,29,58,0.12), 0 2px 8px rgba(255,255,255,0.3) inset;
}

/* Navy card */
.navy {
  background: linear-gradient(145deg, #0d2554 0%, #0b1d3a 100%);
  border: 1px solid rgba(62,184,240,0.2);
  border-radius: 24px;
  box-shadow: 0 16px 48px rgba(11,29,58,0.4), 0 1px 0 rgba(62,184,240,0.15) inset;
}

/* Decorative waves on navy cards */
.navy-wave {
  position: relative;
  overflow: hidden;
}
.navy-wave::before {
  content:'';
  position:absolute;
  width:300px; height:300px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(62,184,240,0.12), transparent 70%);
  top:-80px; right:-60px;
  pointer-events:none;
}
.navy-wave::after {
  content:'';
  position:absolute;
  width:200px; height:200px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(62,184,240,0.08), transparent 70%);
  bottom:-60px; left:-40px;
  pointer-events:none;
}

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(62,184,240,0.3); border-radius:4px; }

/* Input style */
.inp {
  width:100%; box-sizing:border-box;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.4);
  border-radius: 14px;
  padding: 13px 18px;
  color: var(--navy-deep);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  outline: none;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.inp:focus {
  border-color: var(--cyan);
  background: rgba(255,255,255,0.28);
  box-shadow: 0 0 0 3px var(--cyan-glow);
}
.inp::placeholder { color: rgba(11,29,58,0.35); }

/* Textarea */
.ta { resize:vertical; line-height:1.7; min-height:80px; }

/* Select */
select.inp { cursor:pointer; appearance:none; }

/* Label */
.lbl {
  display:block;
  color: var(--text-mid);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* Buttons */
.btn-cyan {
  background: linear-gradient(135deg, #3eb8f0, #1a9de0);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 13px 24px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 6px 24px rgba(62,184,240,0.45);
  transition: all 0.2s;
}
.btn-cyan:hover { transform:translateY(-1px); box-shadow:0 10px 32px rgba(62,184,240,0.55); }

.btn-navy {
  background: linear-gradient(135deg, #0d2554, #0b1d3a);
  color: #fff;
  border: 1.5px solid rgba(62,184,240,0.3);
  border-radius: 14px;
  padding: 13px 24px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-navy:hover { border-color:var(--cyan); box-shadow:0 6px 20px rgba(62,184,240,0.2); }

.btn-success {
  background: linear-gradient(135deg, #22d3a0, #16a085);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 13px 24px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 6px 24px rgba(34,211,160,0.4);
  transition: all 0.2s;
}
.btn-success:hover { transform:translateY(-1px); }

.btn-ghost {
  background: rgba(255,255,255,0.2);
  color: var(--text-mid);
  border: 1.5px solid rgba(255,255,255,0.4);
  border-radius: 14px;
  padding: 13px 24px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: all 0.2s;
}
.btn-ghost:hover { background:rgba(255,255,255,0.35); }

/* Section card */
.sec-card {
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(20px);
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(11,29,58,0.08);
}

/* Status badge */
.badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 12px; border-radius:20px;
  font-size:11px; font-weight:700; letter-spacing:0.06em;
}

/* Nav tab */
.tab-btn {
  display:flex; align-items:center; gap:7px;
  padding:10px 18px;
  background:none; border:none; border-bottom:2.5px solid transparent;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
  white-space:nowrap; margin-bottom:-1.5px;
  color: var(--text-mid);
}
.tab-btn.active {
  border-bottom-color: var(--cyan);
  color: var(--navy-deep);
}
.tab-btn:hover { color:var(--navy-deep); }

/* Wave SVG decoration */
.wave-line {
  position:absolute; bottom:0; left:0; right:0;
  pointer-events:none; opacity:0.15;
}

/* Toast */
.toast {
  position:fixed; bottom:28px; right:28px; z-index:9999;
  background:linear-gradient(135deg,#22d3a0,#16a085);
  color:#fff; padding:14px 24px; border-radius:16px;
  font-weight:700; font-size:14px;
  box-shadow:0 8px 32px rgba(34,211,160,0.45);
  display:flex; align-items:center; gap:10px;
  animation: fadeSlideUp 0.3s ease;
}

/* WhatsApp Connection */
@keyframes qrPulse { 0%,100%{box-shadow:0 0 0 0 rgba(62,184,240,0.4)} 50%{box-shadow:0 0 0 12px rgba(62,184,240,0)} }
@keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.wa-status-bar {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; border-radius:14px;
  font-size:13px; font-weight:700;
  transition: all 0.3s;
}
.wa-log-entry {
  display:flex; align-items:flex-start; gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:12px;
}
.wa-log-entry:last-child { border-bottom:none; }
.wa-qr-container {
  width:240px; height:240px; margin:0 auto 20px;
  border-radius:20px; display:flex;
  align-items:center; justify-content:center;
  transition: all 0.4s;
  position:relative; overflow:hidden;
}
.wa-qr-container img { border-radius:12px; }
.wa-btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

/* ═══════════════════════════════════════════════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════════════════════════════════════════════ */
@media(max-width:768px){
  body::before { width:300px; height:300px; top:-60px; right:-60px; }
  body::after  { width:250px; height:250px; bottom:-40px; left:-40px; }

  .sec-card { padding:18px; border-radius:16px; margin-bottom:12px; }
  .navy { border-radius:18px; }

  .tab-btn { padding:8px 12px; font-size:12px; gap:5px; }
  .btn-cyan, .btn-navy, .btn-success, .btn-ghost {
    padding:12px 18px; font-size:13px; border-radius:12px; min-height:46px;
  }
  .inp { padding:12px 14px; font-size:14px; border-radius:12px; -webkit-appearance:none; }
  .ta { min-height:100px; }
  .lbl { font-size:10px; }

  .wa-qr-container { width:200px; height:200px; border-radius:16px; }
  .wa-btn-row { gap:8px; }
  .wa-status-bar { padding:8px 12px; font-size:12px; }

  .toast { bottom:16px; right:12px; left:12px; padding:12px 16px; font-size:13px;
    border-radius:12px; justify-content:center; text-align:center; }

  /* Grid utilities for mobile */
  .grid-2{grid-template-columns:1fr !important}
  .grid-3{grid-template-columns:1fr !important}

  /* Seguimientos inputs stack */
  .seg-inputs{flex-direction:column !important}

  /* Price/limit grids */
  .price-grid{grid-template-columns:1fr !important}
  .limit-grid{grid-template-columns:1fr !important}

  /* Testimony row stack */
  .testimony-row{flex-direction:column !important}
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESPONSIVE — MOBILE (Android / iPhone)
   ═══════════════════════════════════════════════════════════════════════════ */
@media(max-width:480px){
  body { background:linear-gradient(145deg, #d6eaf8 0%, #c2d9f0 100%); }
  body::before, body::after { display:none; }

  .sec-card { padding:14px; border-radius:14px; margin-bottom:10px; }
  .navy { border-radius:14px; }

  .tab-btn { padding:8px 10px; font-size:11px; gap:4px; }
  .btn-cyan, .btn-navy, .btn-success, .btn-ghost {
    padding:13px 16px; font-size:14px; border-radius:12px; min-height:48px;
    width:100%; justify-content:center;
  }
  .inp { padding:13px 14px; font-size:15px; border-radius:12px; -webkit-appearance:none; }
  .lbl { font-size:10px; margin-bottom:6px; }

  .wa-qr-container { width:180px; height:180px; border-radius:14px; }
  .wa-btn-row { flex-direction:column; gap:8px; align-items:stretch; }
  .wa-btn-row .btn-cyan, .wa-btn-row .btn-navy, .wa-btn-row .btn-ghost {
    width:100%; justify-content:center;
  }

  .badge { font-size:10px; padding:3px 10px; }

  /* Bot list header: stack on mobile */
  .bot-list-header { flex-direction:column !important; gap:14px !important; text-align:center; }
  .bot-list-header .btn-cyan { width:100%; justify-content:center; }

  /* Stats grid: single column on small mobile */
  .stats-mini { grid-template-columns:1fr !important; }

  /* Bot card: adjust for mobile */
  .bot-card-item { padding:16px !important; gap:12px !important; }

  /* Session info grid */
  .session-grid { grid-template-columns:1fr !important; }

  /* Seguimiento inputs flex → column */
  .seg-inputs { flex-direction:column !important; }

  /* Product grid 3-col → 1-col */
  .price-grid, .limit-grid { grid-template-columns:1fr !important; }

  /* Testimony grid: stack on mobile */
  .testimony-row { grid-template-columns:1fr !important; gap:6px !important; }

  /* Tab bar: scrollable, hide long labels */
  .tab-bar { -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .tab-bar::-webkit-scrollbar { display:none; }

  /* Detail header: wrap */
  .detail-top-bar { flex-wrap:wrap !important; gap:10px !important; }
  .detail-top-bar .glass { order:3; width:100%; justify-content:center; }

  /* Bot header navy card */
  .bot-header-card { padding:18px !important; }
  .bot-header-card .status-wrap { margin-top:8px; align-self:flex-start; }

  /* Toast on mobile */
  .toast { bottom:12px; }
}
</style>
</head>

const TabProductos = ({bot, onUpdate}) => {
  const [products, setProducts] = useState([...bot.products]);
  const [editing, setEditing] = useState(null);
  const [saved, setSaved] = useState(false);

  const saveProduct = (p) => {
    const next = editing==="new" ? [...products,{...p,id:Date.now().toString()}]
      : products.map(x=>x.id===p.id?p:x);
    setProducts(next); onUpdate({products:next});
    setEditing(null); setSaved(true); setTimeout(()=>setSaved(false),2500);
  };

  if (editing) return (
    <div style={{animation:"fadeSlideUp 0.3s ease"}}>
      <Toast show={saved}/>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button className="btn-ghost" onClick={()=>setEditing(null)} style={{padding:"8px 16px",fontSize:13}}>← Volver</button>
        <h3 style={{color:"#0b1d3a",fontSize:15,fontWeight:700}}>{editing==="new"?"Nuevo producto":`Editar: ${editing.nombre}`}</h3>
      </div>
      <ProductForm product={editing==="new"?null:editing} onSave={saveProduct} onCancel={()=>setEditing(null)}/>
    </div>
  );

  return (
    <div style={{animation:"fadeSlideUp 0.3s ease"}}>
      <Toast show={saved}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <h3 style={{color:"#0b1d3a",fontSize:15,fontWeight:700}}>Productos del bot</h3>
          <p style={{color:"#6b8ab0",fontSize:13}}>El agente IA consultará esta base de conocimiento</p>
        </div>
        <button className="btn-cyan" onClick={()=>setEditing("new")} style={{padding:"10px 20px"}}>
          <IcPlus s={16} c="#fff"/> Nuevo
        </button>
      </div>
      {products.length===0
        ? <div className="sec-card" style={{textAlign:"center",padding:48}}>
            <div style={{fontSize:40,marginBottom:12}}>📦</div>
            <p style={{color:"#6b8ab0",marginBottom:16}}>No hay productos aún.</p>
            <button className="btn-cyan" onClick={()=>setEditing("new")} style={{margin:"0 auto",padding:"10px 24px"}}><IcPlus s={15} c="#fff"/> Agregar producto</button>
          </div>
        : <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {products.map(p=>(
              <div key={p.id} className="sec-card" style={{display:"flex",alignItems:"center",gap:16,marginBottom:0,cursor:"pointer",transition:"all 0.2s"}}

// ─── TAB: WHATSAPP CONNECTION ─────────────────────────────────────────────────
const WA_STATES = {
  disconnected: {label:'No conectado',     color:'#9ab0c8', bg:'rgba(154,176,200,0.12)', dot:'#9ab0c8'},
  generating:   {label:'Generando QR...',  color:'#ffc857', bg:'rgba(255,200,87,0.12)',  dot:'#ffc857'},
  waiting_scan: {label:'Esperando escaneo',color:'#3eb8f0', bg:'rgba(62,184,240,0.12)',  dot:'#3eb8f0'},
  connected:    {label:'Conectado',        color:'#22d3a0', bg:'rgba(34,211,160,0.12)',  dot:'#22d3a0'},
  error:        {label:'Error de conexión',color:'#ff6b8a', bg:'rgba(255,107,138,0.12)', dot:'#ff6b8a'},
  reconnecting: {label:'Reconectando...',  color:'#ffc857', bg:'rgba(255,200,87,0.12)',  dot:'#ffc857'},
};

const TabQR = ({bot, onUpdate}) => {
  const [status, setStatus]   = useState(bot.whatsapp?.status || 'disconnected');
  const [qrImg, setQrImg]     = useState(null);
  const [error, setError]     = useState(null);
  const [phone, setPhone]     = useState(bot.whatsapp?.phone || null);
  const [lastConn, setLastConn] = useState(bot.whatsapp?.lastConnected || null);
  const [logs, setLogs]       = useState([]);
  const [showLogs, setShowLogs] = useState(false);
  const [saved, setSaved]     = useState(false);
  const [inbox, setInbox]     = useState([]);
  const [unread, setUnread]   = useState(0);
  const [showInbox, setShowInbox] = useState(true);
  const pollRef  = useRef(null);
  const aliveRef = useRef(true);
  const qrTimerRef = useRef(null);
  const msgPollRef = useRef(null);

  const addLog = (msg, type='info') => {
    const now = new Date();
    const t = now.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    setLogs(prev => [{t, msg, type}, ...prev].slice(0, 50));
  };

  // ── API helper ──
  const api = async (path, method='GET', body) => {
    const url = `${API_BASE_URL}/wa/sessions/${bot.id}${path}`;
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e.error || e.message || `HTTP ${res.status}`);
    }
    return res.json();
  };

  // ── QR renderer ──
  const renderQR = async (data) => {
    if (!data) return;
    try {
      if (typeof QRCode !== 'undefined' && QRCode.toDataURL) {
        const url = await QRCode.toDataURL(data, {
          width: 220, margin: 2,
          color: { dark:'#0b1d3a', light:'#ffffff' },
          errorCorrectionLevel: 'M'
        });
        setQrImg(url);
      }
    } catch(e) { addLog('Error renderizando QR','error'); }
  };

  // ── Polling ──
  const stopPoll = () => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
    if (qrTimerRef.current) { clearTimeout(qrTimerRef.current); qrTimerRef.current = null; }
  };

  const startPoll = () => {
    stopPoll();
    pollRef.current = setInterval(async () => {
      if (!aliveRef.current) return stopPoll();
      try {
        const d = await api('/status');
        if (!aliveRef.current) return;

        if (d.status === 'waiting_scan' || d.status === 'qr_ready') {
          if (d.qrDataURL) { setQrImg(d.qrDataURL); setStatus('waiting_scan'); }
          else if (d.qr) { await renderQR(d.qr); setStatus('waiting_scan'); }
        }

        if (d.status === 'connected') {
          setStatus('connected');
          setPhone(d.phone || d.phoneNumber || phone);
          const now = new Date().toISOString();
          setLastConn(now);
          onUpdate({ whatsapp:{ status:'connected', phone:d.phone||d.phoneNumber, lastConnected:now } });
          addLog('WhatsApp conectado exitosamente','success');
          setSaved(true); setTimeout(()=>setSaved(false),2500);
          stopPoll();
        }

        if (d.status === 'disconnected' && status !== 'disconnected') {
          setStatus('disconnected');
          addLog(d.reason ? `Desconectado: ${d.reason}` : 'Sesion finalizada','error');
          stopPoll();
        }
      } catch(e) { /* silent poll */ }
    }, 3000);

    // QR timeout: 60s
    qrTimerRef.current = setTimeout(() => {
      if (status === 'waiting_scan' || status === 'generating') {
        setStatus('error');
        setError('El QR expiró. Genera uno nuevo.');
        setQrImg(null);
        addLog('QR expirado — genera uno nuevo','error');
        stopPoll();
      }
    }, 60000);
  };

  // ── Check status on mount ──
  useEffect(() => {
    aliveRef.current = true;
    api('/status').then(d => {
      if (d.status) setStatus(d.status === 'qr_ready' ? 'waiting_scan' : d.status);
      if (d.phone || d.phoneNumber) setPhone(d.phone || d.phoneNumber);
      if (d.lastConnected) setLastConn(d.lastConnected);
      if (d.status === 'connected') addLog('Sesion activa detectada','success');
    }).catch(() => addLog('Backend no disponible — modo local','info'));
    return () => { aliveRef.current = false; stopPoll(); stopMsgPoll(); };
  }, [bot.id]);

  // ── Polling de mensajes ──
  const fetchMessages = async () => {
    try {
      const d = await api('/messages?limit=50');
      if (d.messages) { setInbox(d.messages); setUnread(d.unread || 0); }
    } catch(e) { /* silent */ }
  };

  const stopMsgPoll = () => { if(msgPollRef.current){clearInterval(msgPollRef.current);msgPollRef.current=null;} };

  const startMsgPoll = () => {
    stopMsgPoll();
    fetchMessages();
    msgPollRef.current = setInterval(fetchMessages, 2000);
  };

  useEffect(() => {
    if (status === 'connected') startMsgPoll();
    else stopMsgPoll();
    return () => stopMsgPoll();
  }, [status]);

  // ── Actions ──
  const generateQR = async () => {
    setStatus('generating'); setError(null); setQrImg(null);
    addLog('Solicitando nueva sesion WhatsApp...');
    try {
      const d = await api('/start', 'POST');
      if (d.qrDataURL || d.qr) {
        if (d.qrDataURL) setQrImg(d.qrDataURL);
        else await renderQR(d.qr);
        setStatus('waiting_scan');
        addLog('QR generado — escanea con tu WhatsApp');
        startPoll();
      } else if (d.status === 'connected') {
        setStatus('connected');
        setPhone(d.phone || d.phoneNumber);
        addLog('Ya estaba conectado','success');
      } else {
        setStatus('waiting_scan');
        addLog('Esperando QR del servidor...');
        startPoll();
      }
    } catch(e) {
      setStatus('error'); setError(e.message);
      addLog(`Error: ${e.message}`,'error');
    }
  };

  const reconnect = async () => {
    setStatus('reconnecting'); setError(null); setQrImg(null);
    addLog('Intentando reconexion...');
    try {
      const d = await api('/reconnect', 'POST');
      if (d.status === 'connected') {
        setStatus('connected');
        addLog('Reconectado exitosamente','success');
      } else {
        setStatus('waiting_scan');
        addLog('Se necesita nuevo escaneo QR');
        if (d.qrDataURL) setQrImg(d.qrDataURL);
        else if (d.qr) await renderQR(d.qr);
        startPoll();
      }
    } catch(e) {
      setStatus('error'); setError(e.message);
      addLog(`Error al reconectar: ${e.message}`,'error');
    }
  };

  const disconnect = async () => {
    if (!confirm('Deseas desvincular WhatsApp de este bot? Tendras que escanear QR de nuevo.')) return;
    addLog('Desvinculando WhatsApp...');
    try {
      await api('/disconnect', 'POST');
    } catch(e) { /* best effort */ }
    setStatus('disconnected'); setQrImg(null); setPhone(null); setLastConn(null);
    onUpdate({ whatsapp:{ status:'disconnected', phone:null, lastConnected:null } });
    addLog('WhatsApp desvinculado');
    stopPoll();
  };

  const st = WA_STATES[status] || WA_STATES.disconnected;
  const isLoading = status === 'generating' || status === 'reconnecting';
  const isWaiting = status === 'waiting_scan';
  const isConnected = status === 'connected';
  const canGenerate = status === 'disconnected' || status === 'error';

  return (
    <div style={{animation:"fadeSlideUp 0.3s ease"}}>
      <Toast show={saved}/>

      {/* ── Status bar ── */}
      <div className="wa-status-bar" style={{background:st.bg, border:`1.5px solid ${st.color}30`, marginBottom:16}}>
        <div style={{width:10,height:10,borderRadius:'50%',background:st.dot, boxShadow:isConnected?`0 0 10px ${st.color}`:'none', animation:isConnected?'pulse 2s infinite':isLoading?'dotBlink 1s infinite':'none', flexShrink:0}}/>
        <span style={{color:st.color,fontWeight:700,fontSize:13,flex:1}}>{st.label}</span>
        {phone && isConnected && <span style={{color:'#0b1d3a',fontSize:12,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{phone}</span>}
        {lastConn && <span style={{color:'#9ab0c8',fontSize:11}}>Ult. conexion: {new Date(lastConn).toLocaleDateString('es',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span>}
      </div>

      {/* ── Main QR card ── */}
      <div className="navy navy-wave" style={{padding:32,textAlign:"center",marginBottom:16,position:"relative"}}>
        <CardDeco/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}>
            <IcWifi s={20} c="#5dd0ff"/>
            <h3 style={{color:"#fff",fontSize:17,fontWeight:700}}>Conectar WhatsApp</h3>
          </div>
          <p style={{color:"rgba(255,255,255,0.45)",fontSize:13,marginBottom:24}}>Vincula una cuenta de WhatsApp a este bot mediante QR</p>

          {/* QR area */}
          <div className="wa-qr-container" style={{
            background: isConnected ? 'rgba(34,211,160,0.08)' : isWaiting ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.04)',
            border: `2px solid ${isConnected ? 'rgba(34,211,160,0.4)' : isWaiting ? 'rgba(62,184,240,0.4)' : 'rgba(255,255,255,0.1)'}`,
            animation: isWaiting ? 'qrPulse 2.5s ease-in-out infinite' : 'none'
          }}>
            {isConnected ? (
              <div style={{textAlign:"center"}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:'rgba(34,211,160,0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'2px solid rgba(34,211,160,0.3)'}}>
                  <IcCheck s={32} c="#22d3a0"/>
                </div>
                <div style={{color:"#22d3a0",fontSize:16,fontWeight:800}}>WhatsApp Conectado</div>
                {phone && <div style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginTop:6,fontFamily:"'JetBrains Mono',monospace"}}>{phone}</div>}
              </div>
            ) : isWaiting && qrImg ? (
              <div style={{textAlign:"center"}}>
                <img src={qrImg} alt="QR WhatsApp" style={{width:200,height:200,borderRadius:12}}/>
              </div>
            ) : isLoading ? (
              <div style={{textAlign:"center"}}>
                <div style={{width:44,height:44,border:"3px solid #3eb8f0",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto"}}/>
                <div style={{color:"#3eb8f0",fontSize:13,marginTop:14,fontWeight:600}}>
                  {status==='reconnecting' ? 'Reconectando...' : 'Generando QR...'}
                </div>
              </div>
            ) : status === 'error' ? (
              <div style={{textAlign:"center",padding:20}}>
                <div style={{fontSize:40,marginBottom:10}}>&#9888;&#65039;</div>
                <div style={{color:"#ff6b8a",fontSize:13,fontWeight:600}}>{error || 'Error de conexion'}</div>
              </div>
            ) : (
              <div style={{textAlign:"center",padding:20}}>
                <div style={{width:60,height:60,borderRadius:16,background:'rgba(62,184,240,0.1)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1.5px solid rgba(62,184,240,0.2)'}}>
                  <IcQr s={28} c="rgba(62,184,240,0.5)"/>
                </div>
                <div style={{color:"rgba(255,255,255,0.35)",fontSize:13}}>Haz clic en "Generar QR" para comenzar</div>
              </div>
            )}
          </div>

          {/* Action buttons */}
          <div className="wa-btn-row">
            {canGenerate && (
              <button className="btn-cyan" onClick={generateQR} style={{padding:"12px 28px"}}>
                <IcQr s={16} c="#fff"/> Generar QR
              </button>
            )}
            {isWaiting && (
              <button className="btn-ghost" onClick={generateQR} style={{color:"#5dd0ff",borderColor:"rgba(62,184,240,0.3)"}}>
                <IcRefresh s={14} c="#5dd0ff"/> Regenerar QR
              </button>
            )}
            {(isConnected || status === 'error') && (
              <button className="btn-navy" onClick={reconnect} style={{padding:"12px 24px"}}>
                <IcRefresh s={15} c="#5dd0ff"/> Reconectar
              </button>
            )}
            {isConnected && (
              <button className="btn-ghost" onClick={disconnect} style={{color:"#ff6b8a",borderColor:"rgba(255,107,138,0.3)",padding:"12px 24px"}}>
                <IcUnlink s={14} c="#ff6b8a"/> Desvincular
              </button>
            )}
          </div>
        </div>
      </div>

      {/* ── Session info card ── */}
      <div className="sec-card" style={{padding:"18px 22px",marginBottom:12}}>
        <SecHeader icon={IcShield} label="Informacion de sesion" color="#3eb8f0"/>
        <div className="session-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div>
            <div style={{color:"#9ab0c8",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Estado</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:st.dot}}/>
              <span style={{color:st.color,fontSize:13,fontWeight:700}}>{st.label}</span>
            </div>
          </div>
          <div>
            <div style={{color:"#9ab0c8",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Numero vinculado</div>
            <span style={{color:phone?"#0b1d3a":"#9ab0c8",fontSize:13,fontWeight:phone?700:400,fontFamily:"'JetBrains Mono',monospace"}}>{phone || 'Sin vincular'}</span>
          </div>
          <div>
            <div style={{color:"#9ab0c8",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Ultima conexion</div>
            <span style={{color:lastConn?"#0b1d3a":"#9ab0c8",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
              {lastConn ? new Date(lastConn).toLocaleString('es',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'}
            </span>
          </div>
          <div>
            <div style={{color:"#9ab0c8",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Bot ID</div>
            <span style={{color:"#6b8ab0",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{bot.id}</span>
          </div>
        </div>
      </div>

      {/* ── Bandeja de mensajes en vivo ── */}
      {isConnected && (
        <div className="sec-card" style={{padding:0,marginBottom:12,overflow:'hidden'}}>

            <IcMsg s={15} c="#3eb8f0"/>
            <span style={{color:'#1a3a70',fontSize:12,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',flex:1,textAlign:'left'}}>Mensajes entrantes</span>
            {unread > 0 && <span style={{background:'linear-gradient(135deg,#3eb8f0,#1a9de0)',color:'#fff',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:800,minWidth:22,textAlign:'center',boxShadow:'0 2px 8px rgba(62,184,240,0.4)'}}>{unread}</span>}

              {inbox.length === 0 ? (
                <div style={{textAlign:'center',padding:'32px 20px'}}>
                  <IcMsg s={32} c="rgba(62,184,240,0.2)"/>

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [bots, setBots] = useState(INITIAL_BOTS);
  const [selected, setSelected] = useState(null);

  // Sincronizar config del bot al servidor para que la IA pueda responder
  const syncConfigToServer = (bot) => {
    const config = {
      openaiKey: bot.credentials?.openaiKey || '',
      model: 'gpt-4o-mini',
      systemPrompt: bot.template?.systemPrompt || '',
      msg1Limit: bot.template?.msg1Limit || 500,
      msg2Limit: bot.template?.msg2Limit || 500,
      msg3Limit: bot.template?.msg3Limit || 500,
      strictJson: bot.template?.strictJson || false,
      reportNumber: bot.credentials?.reportNumber || '',
      products: bot.products || [],
      seguimientos: bot.seguimientos || {},
    };
    fetch(`${API_BASE_URL}/wa/sessions/${bot.id}/config`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(config),
    }).then(()=> console.log('Config sincronizada con servidor'))
      .catch(e=> console.warn('Error sincronizando config:', e.message));
  };

  const updateBot = (id, changes) => {
    setBots(prev => {
      const updated = prev.map(b => b.id===id ? {...b,...changes} : b);
      // Sincronizar al servidor si cambian datos relevantes para la IA
      if (changes.credentials || changes.template || changes.products) {
        const bot = updated.find(b => b.id===id);
        if (bot) syncConfigToServer(bot);
      }
      return updated;
    });
    setSelected(prev => prev?.id===id ? {...prev,...changes} : prev);
  };

  const createBot = () => {
    const nb = {
      id:Date.now().toString(),
      name:"nuevo bot",
      active:false,
      icon:["🤖","💬","💪","🛒","⚡"][Math.floor(Math.random()*5)],
      credentials:{openaiKey:"",reportNumber:""},
      template:{systemPrompt:"",msg1Limit:50,msg2Limit:50,msg3Limit:50,strictJson:true},
      products:[],
      seguimientos:{seg1:15,seg2:4320},
      whatsapp:{status:"disconnected",phone:null,lastConnected:null,lastHeartbeat:null},
    };
    setBots(p=>[...p,nb]);
    setSelected(nb);
  };

  // Al iniciar, cargar configs reales del servidor (sin sobreescribir con mock data)
  useEffect(() => {
    bots.forEach(bot => {
      fetch(`${API_BASE_URL}/wa/sessions/${bot.id}/config`)
        .then(r => r.json())
        .then(sc => {
          if (sc && sc.openaiKey && sc.openaiKey.length > 20) {
            // Actualizar estado local con config del servidor, SIN re-sincronizar
            setBots(prev => prev.map(b => b.id === bot.id ? {
              ...b,
              credentials: { openaiKey: sc.openaiKey, reportNumber: sc.reportNumber || b.credentials.reportNumber },
              template: { ...b.template, systemPrompt: sc.systemPrompt || b.template.systemPrompt, msg1Limit: sc.msg1Limit || b.template.msg1Limit, msg2Limit: sc.msg2Limit || b.template.msg2Limit, msg3Limit: sc.msg3Limit || b.template.msg3Limit },
              products: sc.products && sc.products.length > 0 ? sc.products : b.products,
            } : b));
          }
        })
        .catch(() => {});
    });
  }, []);

  if (selected) {
    const live = bots.find(b=>b.id===selected.id) || selected;
    return <BotDetail bot={live} onBack={()=>setSelected(null)} onUpdate={updateBot}/>;
  }

  return (
    <BotsList
      bots={bots}
      onSelect={setSelected}
      onNew={createBot}
      onDelete={id=>setBots(p=>p.filter(b=>b.id!==id))}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
